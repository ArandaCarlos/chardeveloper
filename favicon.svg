<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7df9ff"/>
      <stop offset="100%" stop-color="#ff2d9b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="#08080f" />
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="url(#grad)" stroke-width="8" opacity="0.3" />
  <text x="44%" y="54%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="300" fill="url(#grad)" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">C</text>
  <text x="76%" y="54%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="300" fill="#7df9ff" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">.</text>
</svg>
